[CAN]
; CAN ID配置（静态标定）
left_static_send_id = 0x61
left_static_recv_id = 0x71
right_static_send_id = 0x261
right_static_recv_id = 0x271

; CAN ID配置（参数标定）
left_param_send_id = 0x60
left_param_recv_id = 0x70
right_param_send_id = 0x260
right_param_recv_id = 0x270


[LeftRadar]
; 左雷达标定参数
enable = true
vehicle_height = 0.5        ; 车辆高度（米）
x_offset = 0.0              ; X轴偏移量（米，车辆前进方向）
y_offset = -0.8             ; Y轴偏移量（米，车辆横向，负值表示左侧）
z_offset = 0.3              ; Z轴偏移量（米，垂直方向）
yaw_angle = 0.0             ; 偏航角（度）
pitch_angle = 0.0           ; 俯仰角（度）
roll_angle = 0.0            ; 翻滚角（度）
orientation = 1             ; 安装方向（0=正向，1=反向）

[RightRadar]
; 右雷达标定参数
enable = true
vehicle_height = 0.5        ; 车辆高度（米）
x_offset = 0.0              ; X轴偏移量（米，车辆前进方向）
y_offset = 0.8              ; Y轴偏移量（米，车辆横向，正值表示右侧）
z_offset = 0.3              ; Z轴偏移量（米，垂直方向）
yaw_angle = 0.0             ; 偏航角（度）
pitch_angle = 0.0           ; 俯仰角（度）
roll_angle = 0.0            ; 翻滚角（度）
orientation = 1             ; 安装方向（0=正向，1=反向）