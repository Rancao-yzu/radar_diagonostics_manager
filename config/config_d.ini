# ============================================================
# DTC 消息配置文件
# 字节序: 大端序 (Motorola)
# ============================================================

[can_ids]
fl_group1 = 0x400
fl_group2 = 0x401
fr_group1 = 0x402
fr_group2 = 0x403
rl_group1 = 0x404
rl_group2 = 0x405
rr_group1 = 0x406
rr_group2 = 0x407

# ============================================================
# GROUP1 帧头字段
# ============================================================
# Byte54-57: 雷达上电时间戳 (uint32, 单位:毫秒, 上电总时间)
# Byte53:    DTC Number (uint8, 当前消息包含的DTC条目总数)
# Byte52:    MessageType (uint8, 固定值0x10, 标识DTC诊断消息)
# Byte50-51: Frame Number (uint16, 消息唯一序号, 0~65535循环递增)
# 接收到的 CAN 消息中，Byte52 的值必须为 0x10，否则为无效消息

[group1_header]
timestamp_bytes = 54, 57
number_byte = 53
message_type_byte = 52
frame_number_bytes = 50, 51
message_type_fixed_value = 0x10

# ============================================================
# GROUP1 DTC条目定义 (每个条目10字节: ts4 + num4 + type1 + status1)
# ============================================================
# 格式: entry编号 = status_byte, type_byte, num_start, num_end, ts_start, ts_end

[group1_entries]
entry1 = 49, 48, 44, 47, 40, 43
entry2 = 39, 38, 34, 37, 30, 33
entry3 = 29, 28, 24, 27, 20, 23
entry4 = 19, 18, 14, 17, 10, 13
entry5 = 9,  8,  4,  7,  0,  3

# ============================================================
# GROUP2 DTC条目定义 (每个条目10字节)
# ============================================================

[group2_entries]
entry6  = 29, 28, 24, 27, 20, 23
entry7  = 39, 38, 34, 37, 30, 33
entry8  = 49, 48, 44, 47, 40, 43
entry9  = 59, 58, 54, 57, 50, 53
entry10 = 9,  8,  4,  7,  0,  3
entry11 = 19, 18, 14, 17, 10, 13

# ============================================================
# DTC 类型定义 (dtc_type) - 根据实际协议
# ============================================================
# bit0: 本轮上电故障发生
# bit1: 本轮上电发生过故障  
# bit2: 上轮上电发生过故障
# bit3-7: 保留

[dtc_type]
bit0 = 本轮上电故障发生
bit1 = 本轮上电发生过故障
bit2 = 上轮上电发生过故障
bit3 = 3
bit4 = 4
bit5 = 5
bit6 = 6
bit7 = 7

# ============================================================
# DTC 状态掩码 (status_mask) - 需要您补充实际定义
# ============================================================

[status_mask]
bit0 = 0
bit1 = 1
bit2 = 2
bit3 = 3
bit4 = 4
bit5 = 5
bit6 = 6
bit7 = 7
